<!-- PLA Command Atlas - Sources Overlay Component -->
<!-- Full-screen overlay for sources and references -->

<div class="overlay-backdrop" (click)="onClose()"></div>

<div class="overlay-content" @overlayAnimation>
  <div class="overlay-header">
    <span class="overlay-title text-uppercase">Sources & References</span>
    <button class="overlay-close" (click)="onClose()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>
  
  <div class="overlay-body">
    <div class="sources-list">
      <div class="source-detail-item" *ngFor="let source of sources">
        <div class="source-detail-header">
          <h3 class="source-detail-name">{{ source.name }}</h3>
          <span class="source-detail-type badge badge-secondary">{{ source.type }}</span>
        </div>
        <p class="source-detail-description text-muted">{{ source.description }}</p>
      </div>
    </div>
  </div>
</div>
