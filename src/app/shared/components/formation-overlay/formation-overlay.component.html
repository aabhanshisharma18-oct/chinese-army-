<!-- PLA Command Atlas - Formation Overlay Component -->
<!-- Full-screen overlay for formation details -->

<div class="overlay-backdrop" (click)="onClose()"></div>

<div class="overlay-content" @overlayAnimation>
  <div class="overlay-header">
    <span class="overlay-title text-uppercase">Formation Details</span>
    <button class="overlay-close" (click)="onClose()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>
  
  <div class="overlay-body">
    <div class="overlay-placeholder">
      <p class="text-muted">Formation details will be displayed here.</p>
    </div>
  </div>
</div>
