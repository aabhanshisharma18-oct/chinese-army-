<!-- PLA Command Atlas - Cookie Consent Component -->

<div class="cookie-consent" *ngIf="visible()">
  <div class="cookie-banner glass">
    <div class="cookie-content">
      <p class="cookie-text">
        This platform uses cookies to enhance user experience and analyze usage patterns. By continuing to browse, you agree to our use of cookies.
      </p>
      <div class="cookie-actions">
        <button class="btn btn-secondary" (click)="acceptCookies()">Accept</button>
      </div>
    </div>
  </div>
</div>
