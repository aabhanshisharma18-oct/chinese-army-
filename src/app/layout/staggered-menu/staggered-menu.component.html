<!-- PLA Command Atlas - Staggered Menu Component -->
<!-- Slide-in menu with staggered animation -->

<div class="menu-backdrop" (click)="onClose()"></div>

<div class="menu-panel" @menuAnimation>
  <div class="menu-header">
    <span class="menu-title text-uppercase">Navigation</span>
    <button class="menu-close" (click)="onClose()">
      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="18" y1="6" x2="6" y2="18"></line>
        <line x1="6" y1="6" x2="18" y2="18"></line>
      </svg>
    </button>
  </div>
  
  <nav class="menu-nav">
    <button 
      class="menu-item text-uppercase" 
      *ngFor="let item of menuItems" 
      (click)="onMenuItemClick(item.action)"
    >
      {{ item.label }}
    </button>
  </nav>
  
  <div class="menu-footer">
    <span class="menu-footer-text text-muted">PLA Command Atlas</span>
  </div>
</div>
