<header class="header" [class.scrolled]="scrolled">
  <nav class="nav-pill glass">
    <!-- Logo Section -->
    <div class="logo-section">
      <a routerLink="/" class="logo-link" (click)="closeMobileMenu()">
        <svg class="logo-mark" viewBox="0 0 40 40" fill="none" xmlns="http://www.w3.org/2000/svg">
          <rect x="4" y="4" width="32" height="32" stroke="currentColor" stroke-width="2" fill="none"/>
          <path d="M12 20 L20 12 L28 20 L20 28 Z" stroke="currentColor" stroke-width="2" fill="none"/>
          <circle cx="20" cy="20" r="4" stroke="currentColor" stroke-width="2" fill="none"/>
        </svg>
        <span class="wordmark">PLA COMMAND ATLAS</span>
      </a>
    </div>
    
    <!-- Navigation Links -->
    <div class="nav-links" [class.mobile-open]="mobileMenuOpen">
      <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}" class="nav-link" (click)="closeMobileMenu()">HOME</a>
      <a routerLink="/hierarchy" routerLinkActive="active" class="nav-link" (click)="closeMobileMenu()">HIERARCHY</a>
      <a routerLink="/land" routerLinkActive="active" class="nav-link" (click)="closeMobileMenu()">LAND</a>
      <a routerLink="/ranks" routerLinkActive="active" class="nav-link" (click)="closeMobileMenu()">RANKS</a>
      <a routerLink="/india-china" routerLinkActive="active" class="nav-link" (click)="closeMobileMenu()">INDIA-CHINA</a>
      <a routerLink="/unit-categories" routerLinkActive="active" class="nav-link" (click)="closeMobileMenu()">UNIT CATEGORIES</a>
      <a routerLink="/advanced-technology" routerLinkActive="active" class="nav-link" (click)="closeMobileMenu()">ADVANCED TECH</a>
      <a routerLink="/aviation-detailed" routerLinkActive="active" class="nav-link" (click)="closeMobileMenu()">AVIATION</a>
      <a routerLink="/air-defence-detailed" routerLinkActive="active" class="nav-link" (click)="closeMobileMenu()">AIR DEFENCE</a>
    </div>
    
    <!-- Technical Echelon Status Badge -->
    <div class="cta-section">
      <div class="status-indicator">
        <span class="pulse-dot"></span>
        <span class="status-text font-mono">SECURE FEED // ACTIVE</span>
      </div>
    </div>
    
    <!-- Mobile Menu Toggle -->
    <button class="menu-toggle" (click)="toggleMobileMenu()" [class.active]="mobileMenuOpen">
      <span class="menu-line"></span>
      <span class="menu-line"></span>
      <span class="menu-line"></span>
    </button>
  </nav>
</header>
